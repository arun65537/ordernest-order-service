server:
  port: 8082

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:${KAFKA_SERVICE_URL:localhost:9092}}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:ordernest-order-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-fragrant-unit-ailk0gqi-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  kafka:
    topic:
      payment-events: ${PAYMENT_EVENTS_TOPIC:payment.events}
    consumer:
      group-id: ${PAYMENT_EVENTS_CONSUMER_GROUP_ID:ordernest-order-service-payment-consumer}
  inventory:
    base-url: ${INVENTORY_API_BASE_URL:https://ordernest-inventory-service.onrender.com}
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-change-me-in-prod-change-me}
