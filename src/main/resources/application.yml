server:
  port: 8082

spring:
  config:
    import: optional:file:./etc/secrets/config.properties,optional:file:/etc/secrets/config.properties
  kafka:
    bootstrap-servers: ${KAFKA_SERVICE_URL:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      security:
        protocol: PLAINTEXT
      ssl:
        truststore:
          type: PEM
          location: ${KAFKA_TRUSTSTORE_PATH:${user.dir}/src/main/resources/ca.pem}
        keystore:
          type: PKCS12
          location: ${KAFKA_KEYSTORE_PATH:${user.dir}/src/main/resources/client.keystore.p12}
          password: changeit

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  kafka:
    topic:
      payment-events: payment.events
      shipment-events: shipment.events
      order-cancelled-events: order.cancelled.events
      order-status-events: order.status.events
    consumer:
      group-id: ordernest-order-service-payment-consumer
  inventory:
    base-url: ${INVENTORY_API_BASE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
